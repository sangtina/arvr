<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MindAR GLB Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.4/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./new.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: false; precision: medium"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false">

    <a-assets timeout="30000">
      <a-asset-item id="model1" src="./model.glb"></a-asset-item>
    </a-assets>

    <!-- IMPORTANT: correct camera for mobile -->
    <a-camera position="0 0 0" look-controls="false" near="0.01" far="1000"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity
        gltf-model="#model1"
        position="0 0 -0.5"
        rotation="90 0 0"
        scale="0.4 0.4 0.4"
        animation-mixer>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
